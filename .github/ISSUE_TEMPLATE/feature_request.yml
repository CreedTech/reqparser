name: Feature request
description: Suggest an improvement or new capability for reqparser
labels:
  - enhancement
body:
  - type: input
    id: summary
    attributes:
      label: Summary
      placeholder: Briefly describe the feature
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      placeholder: What pain point would this feature address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      placeholder: Describe your proposed behavior or API
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - parser
        - generator
        - CLI
        - docs
        - CI/repository
        - security
        - other
